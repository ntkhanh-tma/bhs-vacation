<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TMA BESTMED Team</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="images/vacation.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!--
    Security headers via <meta> — GitHub Pages does not support HTTP headers,
    so these are the closest equivalent available in a static host.

    Content-Security-Policy notes:
      • 'unsafe-inline' for styles: required by Angular Material's runtime style injection.
      • fonts.googleapis.com / fonts.gstatic.com: Angular inlines fonts at build time
        (optimization.fonts.inline = true), so these entries are only needed for
        local development where build-time inlining doesn't run.
      • sheets.googleapis.com: required for the Google Sheets data API.
      • frame-ancestors 'none': modern replacement for X-Frame-Options: DENY.
  -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self';
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src 'self' https://fonts.gstatic.com data:;
                 connect-src 'self' https://sheets.googleapis.com https://script.google.com https://script.googleusercontent.com https://api.api-ninjas.com;
                 img-src 'self' data: https:;
                 frame-ancestors 'none';">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
  <meta http-equiv="Permissions-Policy"
        content="camera=(), microphone=(), geolocation=(), payment=()">

  <!-- Google Fonts — inlined at build time in production (fonts.inline = true). -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
