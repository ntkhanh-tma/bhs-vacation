name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual trigger from the Actions tab

# Only one deployment at a time; cancel any in-progress run for the same ref.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build → github-page branch
    runs-on: ubuntu-latest

    # Need write access to push the github-page branch.
    permissions:
      contents: write

    steps:
      # ── 1. Source checkout ────────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Full history needed so we can push to a different branch later.
          fetch-depth: 0

      # ── 2. Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── 3. Dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      # ── 4. Secrets → environment files ──────────────────────────────────
      #
      # Add GOOGLE_API_KEY and GOOGLE_SHEET_ID in:
      #   GitHub repo → Settings → Secrets and variables → Actions → Secrets
      #
      - name: Generate environment files from secrets
        env:
          GOOGLE_API_KEY:   ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SHEET_ID:  ${{ secrets.GOOGLE_SHEET_ID }}
          VACATION_API_URL: ${{ secrets.VACATION_API_URL }}
          API_NINJAS_KEY:   ${{ secrets.API_NINJAS_KEY }}
        run: node scripts/setup-env.js

      # ── 5. Determine base-href ────────────────────────────────────────────
      #
      # Default: /<repo-name>/  (standard GitHub Pages project URL)
      # Override: set a repository variable called BASE_HREF for custom domains
      #   e.g. BASE_HREF=/  for a user/org page or custom domain.
      #
      - name: Resolve base-href
        run: |
          BASE_HREF="${{ vars.BASE_HREF }}"
          if [ -z "$BASE_HREF" ]; then
            BASE_HREF="/${{ github.event.repository.name }}/"
          fi
          # Wrap in double-quotes to ensure it's treated as a string in the next step
          printf 'BASE_HREF=%s\n' "$BASE_HREF" >> "$GITHUB_ENV"
          echo "Deploying with base-href: $BASE_HREF"

      # ── 6. Production build ───────────────────────────────────────────────
      #
      # angular.json "production-ci" configuration:
      #   • Same as "production" but fonts.inline = true — downloads and bundles
      #     Google Fonts at build time, removing the runtime CDN dependency.
      #     Disabled in the local "production" config because the corporate
      #     proxy/cert chain blocks the download; CI (Ubuntu, open internet) works.
      #   • outputPath.base = "docs", outputPath.browser = ""  → flat ./docs/
      #   • sourceMap: false   (no source map exposure in production)
      #   • namedChunks: false (content-hashed filenames only)
      #   • extractLicenses: false (omits 3rdpartylicenses.txt)
      #
      - name: Build (production)
        run: |
          npx ng build \
            --configuration=production-ci \
            --base-href="$BASE_HREF"

      # ── 7. Post-build: SPA routing + Jekyll bypass ───────────────────────
      #
      # GitHub Pages returns 404.html for unknown routes (deep links, refreshes).
      # Copying index.html → 404.html lets Angular's router handle the URL.
      # .nojekyll prevents GitHub from running Jekyll, which would mangle _angular
      # chunk filenames that start with an underscore.
      #
      - name: Post-build extras
        run: |
          cp docs/index.html docs/404.html
          touch docs/.nojekyll

      # ── 8. Push docs/ to github-page branch ─────────────────────────────
      #
      # Strategy:
      #   a) Move ./docs out of the git working tree.
      #   b) Check out (or create orphan) the github-page branch.
      #   c) Wipe the working tree so the branch only contains what we publish.
      #   d) Restore ./docs and add a root-level .nojekyll.
      #   e) Commit & force-push.
      #
      - name: Deploy to github-page branch
        run: |
          # Save built output before switching branches
          cp -r docs /tmp/angular-docs

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check out existing branch or start an orphan
          if git show-ref --verify --quiet refs/remotes/origin/github-page; then
            git checkout -B github-page origin/github-page
          else
            git checkout --orphan github-page
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # Wipe everything (tracked + untracked), keep only .git/
          git rm -rf . --quiet 2>/dev/null || true
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} + 2>/dev/null || true

          # Restore the build
          cp -r /tmp/angular-docs docs
          touch .nojekyll

          # Commit (skip if nothing changed)
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing new to deploy — skipping commit."
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            git commit -m "deploy: ${SHORT_SHA} ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push origin github-page --force-with-lease 2>/dev/null \
              || git push origin github-page --force
          fi
